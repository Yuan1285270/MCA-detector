<svg xmlns="http://www.w3.org/2000/svg" width="930" height="720" viewBox="0 0 930 720">
  <rect width="100%" height="100%" fill="#f8fafc"/>
  <style>
    .title{font:700 28px -apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;fill:#17202a}
    .subtitle{font:500 15px -apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;fill:#64748b}
    .label{font:600 15px -apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;fill:#17202a}
    .small{font:500 13px -apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;fill:#64748b}
    .tiny{font:500 11px -apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;fill:#64748b}
    .num{font:700 17px -apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;fill:#17202a}
    .claim{font:700 18px -apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;fill:#0f766e}
  </style>
<defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#64748b"/></marker></defs>
<text x="44" y="48" class="title">Updated MCA Detector architecture</text>
<text x="44" y="74" class="subtitle">Separate analysis pipeline from presentation layer. Website displays outputs; it does not define the method.</text><rect x="92" y="112" width="746" height="50" rx="12" fill="#dbeafe" stroke="#d7dee8"/>
<text x="120" y="134" class="label">Raw data</text>
<text x="350" y="134" class="small">Reddit posts + comments + time + relation</text><path d="M 465 164 L 465 187" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow)"/><rect x="92" y="186" width="746" height="50" rx="12" fill="#dcfce7" stroke="#d7dee8"/>
<text x="120" y="208" class="label">LLM analysis</text>
<text x="350" y="208" class="small">Post rhetoric + comment stance</text><path d="M 465 238 L 465 261" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow)"/><rect x="92" y="260" width="746" height="50" rx="12" fill="white" stroke="#d7dee8"/>
<text x="120" y="282" class="label">Feature + multi-graph artifacts</text>
<text x="350" y="282" class="small">Account matrix + count/signed/co-target/co-negative/trigger/tag graphs</text><path d="M 465 312 L 465 335" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow)"/><rect x="92" y="334" width="746" height="50" rx="12" fill="#fef3c7" stroke="#d7dee8"/>
<text x="120" y="356" class="label">MCA seed ranking</text>
<text x="350" y="356" class="small">Review-priority seed selection, not final verdict</text><path d="M 465 386 L 465 409" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow)"/><rect x="92" y="408" width="746" height="50" rx="12" fill="white" stroke="#d7dee8"/>
<text x="120" y="430" class="label">Stage 1 expansion</text>
<text x="350" y="430" class="small">Co-negative backbone; tag/trigger as support; 2-hop controlled expansion</text><path d="M 465 460 L 465 483" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow)"/><rect x="92" y="482" width="746" height="50" rx="12" fill="#dcfce7" stroke="#d7dee8"/>
<text x="120" y="504" class="label">Stage 2 temporal verification</text>
<text x="350" y="504" class="small">Same-post timing + temporal confidence</text><path d="M 465 534 L 465 557" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow)"/><rect x="92" y="556" width="746" height="50" rx="12" fill="#dbeafe" stroke="#d7dee8"/>
<text x="120" y="578" class="label">Review outputs</text>
<text x="350" y="578" class="small">candidate validation, group summary, behavior profile, role table</text><rect x="92" y="632" width="746" height="52" rx="12" fill="white" stroke="#d7dee8" stroke-dasharray="6 5"/>
<text x="120" y="664" class="label">Demo website</text>
<text x="350" y="664" class="small">Client-facing / demo-facing visualization of generated tables</text>
</svg>