<svg xmlns="http://www.w3.org/2000/svg" width="900" height="360" viewBox="0 0 900 360">
  <rect width="100%" height="100%" fill="#ffffff"/>
  <style>
    .title{font:700 18px -apple-system,BlinkMacSystemFont,'Noto Sans TC','PingFang TC','Microsoft JhengHei',Arial,sans-serif;fill:#111827}
    .head{font:700 13px -apple-system,BlinkMacSystemFont,'Noto Sans TC','PingFang TC','Microsoft JhengHei',Arial,sans-serif;fill:#111827}
    .subhead{font:600 12px -apple-system,BlinkMacSystemFont,'Noto Sans TC','PingFang TC','Microsoft JhengHei',Arial,sans-serif;fill:#374151}
    .cell{font:500 12px -apple-system,BlinkMacSystemFont,'Noto Sans TC','PingFang TC','Microsoft JhengHei',Arial,sans-serif;fill:#111827}
    .num{font:700 15px -apple-system,BlinkMacSystemFont,'Noto Sans TC','PingFang TC','Microsoft JhengHei',Arial,sans-serif;fill:#111827}
    .note{font:500 11px -apple-system,BlinkMacSystemFont,'Noto Sans TC','PingFang TC','Microsoft JhengHei',Arial,sans-serif;fill:#4b5563}
    .grid{stroke:#d1d5db;stroke-width:1}
    .major{stroke:#6b7280;stroke-width:1.2}
  </style>

  <text x="30" y="34" class="title">Case comparison from official top-20 seed groups</text>
  <text x="30" y="56" class="note">Stage 1 measures candidate-group structure; Stage 2 measures temporal evidence within the candidate group.</text>

  <rect x="30" y="78" width="840" height="210" fill="#ffffff" stroke="#6b7280" stroke-width="1.2"/>

  <!-- header bands -->
  <rect x="30" y="78" width="840" height="34" fill="#f3f4f6"/>
  <rect x="30" y="112" width="840" height="34" fill="#f9fafb"/>
  <rect x="30" y="146" width="840" height="71" fill="#ffffff"/>
  <rect x="30" y="217" width="840" height="71" fill="#f9fafb"/>

  <!-- vertical grid -->
  <line x1="185" y1="78" x2="185" y2="288" class="major"/>
  <line x1="275" y1="112" x2="275" y2="288" class="grid"/>
  <line x1="365" y1="112" x2="365" y2="288" class="grid"/>
  <line x1="455" y1="112" x2="455" y2="288" class="grid"/>
  <line x1="545" y1="78" x2="545" y2="288" class="major"/>
  <line x1="625" y1="112" x2="625" y2="288" class="grid"/>
  <line x1="705" y1="112" x2="705" y2="288" class="grid"/>
  <line x1="785" y1="112" x2="785" y2="288" class="grid"/>

  <!-- horizontal grid -->
  <line x1="30" y1="112" x2="870" y2="112" class="major"/>
  <line x1="30" y1="146" x2="870" y2="146" class="grid"/>
  <line x1="30" y1="217" x2="870" y2="217" class="major"/>

  <!-- group headers -->
  <text x="60" y="101" class="head">Candidate group</text>
  <text x="305" y="101" class="head">Stage 1: structural expansion evidence</text>
  <text x="637" y="101" class="head">Stage 2: temporal verification evidence</text>

  <!-- column headers -->
  <text x="207" y="133" class="subhead">Members</text>
  <text x="292" y="133" class="subhead">Tier 1</text>
  <text x="379" y="133" class="subhead">Internal</text>
  <text x="462" y="133" class="subhead">Shared neg.</text>
  <text x="565" y="133" class="subhead">Strong</text>
  <text x="640" y="133" class="subhead">Moderate</text>
  <text x="724" y="133" class="subhead">Robust</text>
  <text x="807" y="133" class="subhead">Weak</text>

  <!-- row labels -->
  <text x="52" y="181" class="cell">harvested</text>
  <text x="52" y="251" class="cell">Odd-Following-247</text>

  <!-- harvested values -->
  <text x="221" y="181" class="num">8</text>
  <text x="313" y="181" class="num">7</text>
  <text x="401" y="181" class="num">9</text>
  <text x="488" y="181" class="num">11</text>
  <text x="589" y="181" class="num">1</text>
  <text x="667" y="181" class="num">0</text>
  <rect x="708" y="157" width="76" height="48" fill="#e5e7eb" stroke="#d1d5db"/>
  <text x="746" y="181" text-anchor="middle" class="num">1</text>
  <text x="826" y="181" class="num">4</text>

  <!-- Odd-Following values -->
  <text x="217" y="251" class="num">11</text>
  <text x="313" y="251" class="num">7</text>
  <text x="397" y="251" class="num">24</text>
  <text x="488" y="251" class="num">15</text>
  <text x="589" y="251" class="num">0</text>
  <text x="667" y="251" class="num">0</text>
  <rect x="708" y="228" width="76" height="48" fill="#ffffff" stroke="#d1d5db"/>
  <text x="746" y="251" text-anchor="middle" class="num">0</text>
  <text x="822" y="251" class="num">40</text>

  <!-- explanatory notes -->
  <text x="30" y="318" class="note">Note. Tier 1 = direct co-negative-target expansion members. Internal = internal co-target/co-negative edges. Shared neg. = shared negative-target rows.</text>
  <text x="30" y="337" class="note">The contrast shows why Stage 1 is used for candidate discovery, while Stage 2 is used to calibrate evidence confidence.</text>
</svg>
