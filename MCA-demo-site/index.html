<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MCA Sentinel | Overview</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-page="overview">
    <header class="topbar">
      <a class="brand" href="./index.html" aria-label="MCA Sentinel home">
        <img src="./assets/mca-sentinel-logo.svg" alt="" />
        <span>
          <strong>MCA Sentinel</strong>
          <small data-copy="brandTag">協同風險情資</small>
        </span>
      </a>
      <nav class="topnav" aria-label="Primary navigation">
        <a class="active" href="./index.html" data-copy="navOverview">總覽</a>
        <a href="./groups.html" data-copy="navGroups">風險群組</a>
        <a href="./accounts.html" data-copy="navAccounts">異常帳號</a>
        <a href="./methodology.html" data-copy="navMethod">方法</a>
      </nav>
      <div class="toolbar">
        <div class="toggle" aria-label="Audience mode">
          <button class="active" type="button" data-mode="client">Client</button>
          <button type="button" data-mode="demo">Demo</button>
        </div>
        <div class="toggle" aria-label="Language">
          <button class="active" type="button" data-lang="zh">中文</button>
          <button type="button" data-lang="en">EN</button>
        </div>
      </div>
    </header>

    <main class="page">
      <section class="hero">
        <div>
          <p class="eyebrow" data-copy="overviewEyebrow">社群風險營運面板</p>
          <h1 data-copy="overviewTitle">把大量帳號互動轉成可審查的風險案件</h1>
          <p class="hero-copy" data-copy="overviewLead"></p>
          <div class="hero-actions">
            <a class="button primary" href="./groups.html" data-copy="reviewGroups">檢視風險群組</a>
            <a class="button" href="./methodology.html" data-copy="viewMethod">查看方法</a>
          </div>
        </div>
        <div class="hero-card" id="topCaseCard"></div>
      </section>

      <section class="kpi-grid" id="metricGrid" aria-label="Run metrics"></section>

      <section class="split-layout">
        <div class="panel">
          <div class="panel-heading">
            <p class="eyebrow" data-copy="priorityEyebrow">優先處理</p>
            <h2 data-copy="priorityTitle">目前最值得審查的群組</h2>
          </div>
          <div id="priorityGroups"></div>
        </div>
        <div class="panel quiet-panel">
          <div class="panel-heading">
            <p class="eyebrow" data-copy="workflowEyebrow">作業流程</p>
            <h2 data-copy="workflowTitle">給分析師的下一步</h2>
          </div>
          <div class="workflow-list" id="workflowList"></div>
        </div>
      </section>
    </main>

    <script src="./data/demo-data.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
